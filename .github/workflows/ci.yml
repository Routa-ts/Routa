name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-checks:
    name: Repo checks
    uses: ./.github/workflows/node-pnpm-job.yml
    with:
      command: pnpm check

  lint:
    name: Lint
    uses: ./.github/workflows/node-pnpm-job.yml
    with:
      command: pnpm lint

  typecheck:
    name: Typecheck
    uses: ./.github/workflows/node-pnpm-job.yml
    with:
      command: pnpm typecheck

  test:
    name: Test
    uses: ./.github/workflows/node-pnpm-job.yml
    with:
      command: |
        pnpm --filter './packages/*' build
        scripts/link-ci-routa.sh
        pnpm test

  build:
    name: Build
    uses: ./.github/workflows/node-pnpm-job.yml
    with:
      command: |
        pnpm --filter './packages/*' build
        scripts/link-ci-routa.sh
        pnpm build

  cli-validation:
    name: CLI validation
    uses: ./.github/workflows/node-pnpm-job.yml
    with:
      command: |
        pnpm --filter './packages/*' build
        scripts/link-ci-routa.sh
        pnpm build
        pnpm --filter './examples/*' check
        pnpm --filter './examples/*' openapi:check
        scripts/scaffold-error-smoke.sh

  pack-check:
    name: Pack check
    uses: ./.github/workflows/node-pnpm-job.yml
    with:
      timeout-minutes: 20
      command: pnpm pack:check
