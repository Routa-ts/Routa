name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-checks:
    name: Repo checks
    uses: ./.github/workflows/node-pnpm-job.yml
    with:
      command: pnpm check

  lint:
    name: Lint
    uses: ./.github/workflows/node-pnpm-job.yml
    with:
      command: pnpm lint

  typecheck:
    name: Typecheck
    uses: ./.github/workflows/node-pnpm-job.yml
    with:
      command: pnpm typecheck

  test:
    name: Test
    uses: ./.github/workflows/node-pnpm-job.yml
    with:
      command: |
        pnpm --filter './packages/*' build
        node scripts/link-local-cli.mjs --root "$GITHUB_WORKSPACE"
        pnpm test

  build:
    name: Build
    uses: ./.github/workflows/node-pnpm-job.yml
    with:
      command: |
        pnpm --filter './packages/*' build
        node scripts/link-local-cli.mjs --root "$GITHUB_WORKSPACE"
        pnpm build

  docs:
    name: Docs
    uses: ./.github/workflows/node-pnpm-job.yml
    with:
      command: pnpm --filter @routa-ts/docs build

  cli-validation:
    name: CLI validation
    uses: ./.github/workflows/node-pnpm-job.yml
    with:
      command: |
        pnpm --filter './packages/*' build
        node scripts/link-local-cli.mjs --root "$GITHUB_WORKSPACE"
        pnpm build
        pnpm --filter './examples/*' check
        pnpm --filter './examples/*' openapi:check
        node scripts/check-generated.mjs
        scripts/scaffold-error-smoke.sh

  pack-check:
    name: Pack check
    uses: ./.github/workflows/node-pnpm-job.yml
    with:
      timeout-minutes: 20
      command: pnpm pack:check
